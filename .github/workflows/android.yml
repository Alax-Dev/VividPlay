name: Android CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build variant to produce'
        required: true
        default: 'debug'
        type: choice
        options:
          - debug
          - release
      upload_artifact:
        description: 'Upload APK as workflow artifact'
        required: false
        default: true
        type: boolean

jobs:
  build:
    name: Build VividPlay (${{ github.event.inputs.build_type || 'debug' }})
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3
        with:
          cmdline-tools-version: 11076708

      - name: Install NDK + CMake
        run: |
          yes | sdkmanager "ndk;26.1.10909125" "cmake;3.22.1" "platforms;android-34" "build-tools;34.0.0" >/dev/null

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: ${{ runner.os }}-gradle-

      - name: Grant execute permission to gradlew
        run: chmod +x ./gradlew

      - name: Build APK
        env:
          BUILD_TYPE: ${{ github.event.inputs.build_type || 'debug' }}
        run: |
          if [ "$BUILD_TYPE" = "release" ]; then
            ./gradlew :app:assembleRelease --stacktrace
          else
            ./gradlew :app:assembleDebug --stacktrace
          fi

      - name: Locate APK
        id: apk
        run: |
          apk=$(find app/build/outputs/apk -name "*.apk" | head -n1)
          echo "path=$apk" >> $GITHUB_OUTPUT
          echo "Found APK: $apk"

      - name: Upload APK artifact
        if: ${{ github.event.inputs.upload_artifact != 'false' }}
        uses: actions/upload-artifact@v4
        with:
          name: vividplay-${{ github.event.inputs.build_type || 'debug' }}-${{ github.sha }}
          path: app/build/outputs/apk/**/*.apk
          if-no-files-found: error
          retention-days: 30
